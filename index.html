<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포물선 작도 웹앱 - 1. 자취</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        #menu { position: absolute; top: 0; width: 100%; display: flex; justify-content: center; background: rgba(255, 255, 255, 0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; }
        .tab { padding: 15px 20px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: bold; color: #555; }
        .tab.active { border-bottom: 3px solid #007bff; color: #007bff; }
        #instructions { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; pointer-events: none; }
    </style>
</head>
<body>

<div id="menu">
    <div class="tab active">1. 자취 작도</div>
    <div class="tab" onclick="alert('곧 업데이트될 예정입니다!')">2. 정의 학습</div>
    <div class="tab" onclick="alert('곧 업데이트될 예정입니다!')">3. 광학 성질</div>
</div>

<div id="instructions">빨간색 준선 위의 점 A를 위아래로 드래그해보세요!</div>

<script>
    let focusF;
    let directrixX = 150; // 준선 위치 (세로선)
    let points = [];      // 자취를 저장할 배열
    let isDragging = false;
    let ay;               // 점 A의 y좌표

    function setup() {
        createCanvas(windowWidth, windowHeight);
        focusF = createVector(450, height / 2); // 초점 F의 위치
        ay = height / 2;
    }

    function draw() {
        background(255);
        drawGrid();

        // 1. 준선 그리기 (빨간색)
        stroke(255, 59, 48);
        strokeWeight(4);
        line(directrixX, 0, directrixX, height);
        
        // 2. 초점 F 그리기 (파란색)
        fill(0, 122, 255);
        noStroke();
        ellipse(focusF.x, focusF.y, 15, 15);
        textAlign(CENTER);
        text("초점 F", focusF.x, focusF.y - 15);

        // 3. 드래그 로직 (준선 근처에서 마우스/터치 시)
        if (mouseIsPressed) {
            if (abs(mouseX - directrixX) < 50 || isDragging) {
                ay = constrain(mouseY, 50, height - 50);
                isDragging = true;
            }
        } else {
            isDragging = false;
        }

        // 4. 점 A (준선 위)
        fill(40, 167, 69);
        ellipse(directrixX, ay, 12, 12);
        text("A", directrixX - 25, ay + 5);

        // 5. 점 B 계산 (수학적 원리: AF 중점의 수직이등분선과 A에서 나가는 수선의 교점)
        // x-d = sqrt((x-fx)^2 + (ay-fy)^2) 공식을 정리한 것
        let fx = focusF.x;
        let fy = focusF.y;
        let d = directrixX;
        let bx = (pow(fx, 2) + pow(ay - fy, 2) - pow(d, 2)) / (2 * (fx - d));
        let by = ay;

        // 6. 연결선 및 거리 표시 (이미지 요청 사항)
        stroke(40, 167, 69);
        strokeWeight(2);
        line(directrixX, ay, bx, by); // 준선-B (가로선)
        line(fx, fy, bx, by);         // 초점-B (대각선)

        // 거리 텍스트와 기호 (||)
        let distVal = abs(bx - directrixX);
        fill(0);
        noStroke();
        textSize(14);
        text("길이: " + distVal.toFixed(2), (directrixX + bx) / 2, ay - 10);
        text("길이: " + distVal.toFixed(2), (fx + bx) / 2, (fy + by) / 2 - 10);

        // 7. 자취 기록 및 그리기
        if (isDragging) {
            points.push({x: bx, y: by});
        }

        noFill();
        stroke(100, 100, 100, 150);
        strokeWeight(2);
        beginShape();
        for (let p of points) {
            vertex(p.x, p.y);
        }
        endShape();

        // 현재 점 B 표시
        fill(255, 59, 48);
        ellipse(bx, by, 10, 10);
        text("B (자취)", bx + 30, by + 5);
    }

    function drawGrid() {
        stroke(240);
        strokeWeight(1);
        for (let i = 0; i < width; i += 40) line(i, 0, i, height);
        for (let j = 0; j < height; j += 40) line(0, j, width, j);
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>

</body>
</html>
