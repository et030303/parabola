<style>
    /* 설명창 스타일 */
    #definition-box { 
        position: absolute; top: 120px; right: 20px; width: 280px; 
        background: white; padding: 20px; border-radius: 12px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: none; z-index: 102;
    }
    .term-label { font-size: 12px; background: #fff; border: 1px solid #ddd; padding: 2px 5px; border-radius: 4px; }
</style>

<div id="menu">
    <div class="tab" onclick="changeMode(1)">1. 자취 작도</div>
    <div class="tab active" id="tab2" onclick="changeMode(2)">2. 정의 학습</div>
    <div class="tab" onclick="alert('곧 업데이트될 예정입니다!')">3. 광학 성질</div>
</div>

<div id="definition-box">
    <h3 style="margin-top:0">포물선의 정의</h3>
    <p style="font-size:14px; line-height:1.6;">
        평면 위의 한 점 <b>F(초점)</b>와 그 점을 지나지 않는 한 직선 <b>l(준선)</b>에 이르는 거리가 같은 점들의 집합입니다.
    </p>
    <button onclick="toggleDef()" style="background:#007bff; width:100%;">이해 완료</button>
</div>

<script>
    let mode = 1; // 1: 자취, 2: 정의
    let showTerms = { focus: false, directrix: false, vertex: false, axis: false };
    let clickPoint = null; // 사용자가 포물선 위를 클릭한 지점

    // 모드 변경 함수
    function changeMode(m) {
        mode = m;
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach((t, i) => t.classList.toggle('active', i + 1 === m));
        if(m === 2) {
            document.getElementById('definition-box').style.display = 'block';
            resetView();
        } else {
            document.getElementById('definition-box').style.display = 'none';
        }
    }

    function toggleDef() {
        document.getElementById('definition-box').style.display = 'none';
    }

    // p5.js의 draw() 함수 내부에 추가될 로직
    function draw() {
        // ... (기존 좌표 변환 push/pop 로직) ...

        if (mode === 2) {
            drawDefinitionMode();
        } else {
            drawTraceMode(); // 기존 1번 코드
        }
    }

    function drawDefinitionMode() {
        let p = 100; // 초점 거리 (x^2 = 4py 형태를 위해 설정)
        let fx = width/2 + p;
        let fy = height/2;
        let dx = width/2 - p;

        // 1. 축 (Axis)
        stroke(200);
        line(0, fy, width, fy);
        if (showTerms.axis) {
            fill(100); noStroke(); text("축 (Axis)", width - 60, fy - 10);
        }

        // 2. 준선 (Directrix)
        stroke(255, 59, 48);
        line(dx, 0, dx, height);
        if (showTerms.directrix) {
            fill(255, 59, 48); noStroke(); text("준선 l", dx - 30, 100);
        }

        // 3. 포물선 본체
        noFill(); stroke(0); strokeWeight(2);
        beginShape();
        for (let y = 0; y < height; y += 5) {
            let x = pow(y - fy, 2) / (4 * p) + (width/2);
            vertex(x, y);
        }
        endShape();

        // 4. 초점 F
        fill(0, 122, 255);
        ellipse(fx, fy, 12, 12);
        if (showTerms.focus) {
            fill(0, 122, 255); noStroke(); text("초점 F", fx, fy - 15);
        }

        // 5. 꼭짓점
        fill(0);
        ellipse(width/2, fy, 8, 8);
        if (showTerms.vertex) {
            text("꼭짓점", width/2, fy + 25);
        }

        // 6. 클릭 상호작용 (거리 표시)
        if (mouseIsPressed && !isOverMenu()) {
            // 마우스 위치에서 가장 가까운 포물선 위의 점 계산
            let my = (mouseY - height/2 - offsetY) / zoom + height/2;
            let mx = pow(my - fy, 2) / (4 * p) + (width/2);
            
            stroke(34, 197, 94);
            line(mx, my, dx, my); // 준선까지 거리
            line(mx, my, fx, fy); // 초점까지 거리
            
            fill(34, 197, 94); noStroke();
            let d = abs(mx - dx);
            text("d = " + d.toFixed(1), (mx + dx)/2, my - 10);
            text("d = " + d.toFixed(1), (mx + fx)/2, (my + fy)/2 - 10);
            
            ellipse(mx, my, 10, 10);
        }
    }

    // 마우스 클릭 시 정보 공개
    function mouseClicked() {
        if (mode === 2) {
            let wx = (mouseX - width/2 - offsetX) / zoom + width/2;
            let wy = (mouseY - height/2 - offsetY) / zoom + height/2;
            
            // 각 요소 근처를 클릭하면 정보 표시
            if (dist(wx, wy, width/2 + 100, height/2) < 30) showTerms.focus = true;
            if (abs(wx - (width/2 - 100)) < 20) showTerms.directrix = true;
            if (dist(wx, wy, width/2, height/2) < 30) showTerms.vertex = true;
            if (abs(wy - height/2) < 20) showTerms.axis = true;
        }
    }
</script>
